<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cochrane Finance Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .hub {
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.sub {
    color: #94a3b8;
    margin-bottom: 2.5rem;
    font-size: 0.95rem;
  }
  .cards {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  a.card {
    display: block;
    width: 240px;
    padding: 1.75rem 1.5rem;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    text-decoration: none;
    color: #fff;
    transition: transform 0.2s, background 0.2s;
    backdrop-filter: blur(10px);
  }
  a.card:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.1);
  }
  .card .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; }
  .card p { font-size: 0.82rem; color: #94a3b8; line-height: 1.5; }
  .updated {
    margin-top: 2.5rem;
    font-size: 0.78rem;
    color: #475569;
  }
</style>
</head>
<body>
<div class="hub">
  <h1>Cochrane Finance Hub</h1>
  <p class="sub">Personal finance dashboard — updated automatically from Cowork</p>
  <div class="cards">
    <a class="card" href="daily_dashboard.html">
      <div class="icon">📊</div>
      <h2>Daily Dashboard</h2>
      <p>Net worth, cash flow, mortgage, accounts, and financial runway</p>
    </a>
    <a class="card" href="Cochrane_Bill_Tracker.html">
      <div class="icon">📋</div>
      <h2>Bill Tracker</h2>
      <p>All bills, due dates, account balances, and payment schedule</p>
    </a>
  </div>
  <p class="updated">Last pushed from Cowork session</p>
</div>
</body>
</html>
